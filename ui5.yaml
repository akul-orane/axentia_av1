specVersion: "3.2"
metadata:
  name: com.demo.fioriapp
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
builder:
  customTasks:
    - name: ui5-tooling-transpile
      afterTask: replaceVersion
      configuration:
        debug: true
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      mountPath: /sap
      afterMiddleware: compression
      configuration:
        baseUri: "https://your-s4-system-url.com"
        httpHeaders:
          "X-CSRF-Token": "Fetch"
        limit: 1000mb
