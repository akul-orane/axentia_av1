specVersion: "3.2"
metadata:
  name: com.demo.fioriapp
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      mountPath: /sap
      afterMiddleware: compression
      configuration:
        baseUri: "https://npsap01.namdhariseeds.com:44310"
        httpHeaders:
          "X-CSRF-Token": "Fetch"
          "sap-language": "EN"
        limit: "100mb"
        enableCors: true
