specVersion: "3.2"
metadata:
  name: com.demo.fioriapp
type: application
framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      mountPath: /sap/opu/odata
      afterMiddleware: compression
      configuration:
        baseUri: https://s4d-001.example.com:44300  # <<< UPDATE THIS TO YOUR ACTUAL SAP SYSTEM URL / hostname + port
        httpHeaders:
          "sap-client": "100"  # adjust client if needed
        # proxy options (optional)
        # debug: true
