<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z_CDS_AKULPRACT - OData App</title>

  <script
    id="sap-ui-bootstrap"
    src="https://sapui5.hana.ondemand.com/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_fiori_3"
    data-sap-ui-libs="sap.m,sap.ui.table,sap.ui.layout"
    data-sap-ui-resourceroots='{
      "com.demo.fioriapp": "./"
    }'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-xx-bindingSyntax="complex">
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }
    .sapUiBody {
      height: 100%;
    }
  </style>

  <script>
    sap.ui.getCore().attachInit(async function () {
      // Use asynchronous Component.create() to avoid deprecation warning for synchronous loading of routing classes
      const oComponent = await sap.ui.core.Component.create({
        name: "com.demo.fioriapp",
        id: "mainComponent",
        settings: {
          // width/height on Component itself is not supported - use CSS on container instead
        }
      });

      new sap.ui.core.ComponentContainer({
        component: oComponent,
        height: "100%",
        width: "100%"  // moved to ComponentContainer (valid property)
      }).placeAt("content");
    });
  </script>
</head>

<body class="sapUiBody" id="content">
</body>
</html>
